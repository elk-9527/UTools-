<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>桌面组件启动器</title>
</head>
<body>
  <script>
    /**
     * index.html — 插件入口
     * 为每个模块创建独立的桌面悬浮窗（直接呈现在 Win11 桌面上）
     */
    const MODULE_CONFIGS = [
      { id: 'clock',         name: '时钟',   w: 260, h: 160 },
      { id: 'calendar',      name: '日历',   w: 280, h: 320 },
      { id: 'weather',       name: '天气',   w: 280, h: 240 },
      { id: 'todo',          name: '待办',   w: 280, h: 340 },
      { id: 'quick-launch',  name: '快捷启动', w: 320, h: 240 }
    ];

    const widgetWindows = {};

    function createWidgetWindow(modConfig) {
      // 读取已保存的布局
      const layout = utools.db.get('widget-layout');
      const saved = layout?.modules?.[modConfig.id];
      const display = utools.getPrimaryDisplay();
      const workArea = display.workAreaSize;

      const x = saved?.x ?? Math.min(40 + Math.random() * 200, workArea.width - modConfig.w - 40);
      const y = saved?.y ?? Math.min(60 + Math.random() * 200, workArea.height - modConfig.h - 60);
      const w = saved?.w || modConfig.w;
      const h = saved?.h || modConfig.h;

      console.log(`[DesktopWidget] 创建 ${modConfig.name} 窗口`, { x, y, w, h });

      const win = utools.createBrowserWindow(
        `widget.html?module=${modConfig.id}`,
        {
          show: false,
          x, y, width: w, height: h,
          minWidth: 160, minHeight: 100,
          maxWidth: 600, maxHeight: 600,
          frame: false,
          transparent: true,
          alwaysOnTop: true,
          skipTaskbar: true,
          resizable: false,  // 由模块内部 JS 控制缩放
          hasShadow: false,
          thickFrame: false,
          webPreferences: {
            preload: 'preload.js'
          }
        },
        () => {
          if (win && !win.isDestroyed()) {
            win.show();
            win.setAlwaysOnTop(true, 'screen-saver');
            console.log(`[DesktopWidget] ${modConfig.name} 窗口已显示`);
          }
        }
      );

      widgetWindows[modConfig.id] = win;
      return win;
    }

    utools.onPluginEnter(({ code }) => {
      if (code !== 'desktop-widget') return;

      // 检查是否已有窗口存活
      const existingKeys = Object.keys(widgetWindows).filter(k => {
        const w = widgetWindows[k];
        return w && !w.isDestroyed();
      });

      if (existingKeys.length > 0) {
        // 已有窗口：全部显示并聚焦
        for (const k of existingKeys) {
          try { widgetWindows[k].show(); widgetWindows[k].focus(); } catch(e) {}
        }
        utools.hideMainWindow();
        return;
      }

      // 首次启动：为每个模块创建独立窗口
      try {
        for (const cfg of MODULE_CONFIGS) {
          createWidgetWindow(cfg);
        }
      } catch (err) {
        console.error('[DesktopWidget] 创建窗口异常:', err);
        utools.showNotification('桌面组件启动失败: ' + err.message);
      }

      utools.hideMainWindow();
    });

    // 插件退出时清理所有窗口
    utools.onPluginOut((isKill) => {
      console.log('[DesktopWidget] 插件退出, isKill:', isKill);
      if (isKill) {
        for (const k of Object.keys(widgetWindows)) {
          try {
            if (widgetWindows[k] && !widgetWindows[k].isDestroyed()) {
              widgetWindows[k].close();
            }
          } catch(e) {}
          delete widgetWindows[k];
        }
      }
    });
  </script>
</body>
</html>
