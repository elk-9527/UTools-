<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>桌面组件启动器</title>
</head>
<body>
  <script>
    /**
     * index.html — 插件入口
     * 为每个模块创建独立的桌面悬浮窗（直接呈现在 Win11 桌面上）
     */
    const MODULE_CONFIGS = [
      { id: 'clock',         name: '时钟',     w: 260, h: 160, x: 40,  y: 60 },
      { id: 'calendar',      name: '日历',     w: 280, h: 320, x: 320, y: 60 },
      { id: 'weather',       name: '天气',     w: 280, h: 240, x: 620, y: 60 },
      { id: 'todo',          name: '待办',     w: 280, h: 340, x: 40,  y: 260 },
      { id: 'quick-launch',  name: '快捷启动', w: 320, h: 240, x: 340, y: 410 }
    ];

    const widgetWindows = {};

    // 读取全局层级设置
    function getGlobalZOrder() {
      const settings = utools.db.get('widget-settings') || {};
      return settings.zOrder || 'bottom';  // 默认底层，不挡其他窗口
    }

    // 应用层级到指定窗口
    function applyZOrder(win, level) {
      if (!win || win.isDestroyed()) return;
      if (level === 'top') {
        win.setAlwaysOnTop(true, 'screen-saver');
      } else if (level === 'normal') {
        win.setAlwaysOnTop(false);
        win.moveTop();
      } else {
        // 底层：取消置顶 + 沉到最底
        win.setAlwaysOnTop(false);
        try { win.moveBottom(); } catch(e) {}
      }
    }

    function createWidgetWindow(modConfig) {
      if (widgetWindows[modConfig.id] && !widgetWindows[modConfig.id].isDestroyed()) {
        return widgetWindows[modConfig.id];
      }

      const layout = utools.db.get('widget-layout');
      const saved = layout?.modules?.[modConfig.id];
      const display = utools.getPrimaryDisplay();
      const workArea = display.workAreaSize;

      const defaultX = Math.min(modConfig.x, Math.max(0, workArea.width - modConfig.w - 24));
      const defaultY = Math.min(modConfig.y, Math.max(0, workArea.height - modConfig.h - 24));
      const x = saved?.x ?? defaultX;
      const y = saved?.y ?? defaultY;
      const w = saved?.w || modConfig.w;
      const h = saved?.h || modConfig.h;

      console.log(`[DesktopWidget] 创建 ${modConfig.name} 窗口`, { x, y, w, h });

      const win = utools.createBrowserWindow(
        `widget.html?module=${modConfig.id}`,
        {
          show: false,
          x, y, width: w, height: h,
          minWidth: 160, minHeight: 100,
          maxWidth: 600, maxHeight: 600,
          frame: false,
          transparent: true,
          alwaysOnTop: false,  // 默认底层，不遮挡其他窗口
          skipTaskbar: true,
          resizable: false,
          minimizable: false,
          hasShadow: false,
          thickFrame: false,
          backgroundColor: '#00000000',
          webPreferences: {
            preload: 'preload.js'
          }
        },
        () => {
          if (win && !win.isDestroyed()) {
            win.show();
            const zOrder = getGlobalZOrder();
            applyZOrder(win, zOrder);
            win.focus();
            console.log(`[DesktopWidget] ${modConfig.name} 显示完成, zOrder=${zOrder}`);
          }
        }
      );

      widgetWindows[modConfig.id] = win;
      return win;
    }

    // ======== 监听子窗口发送的层级变更消息 ========
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('zorder-change', (event, data) => {
        const zOrder = typeof data === 'string' ? data : data?.zOrder;
        console.log('[DesktopWidget] 收到层级变更请求:', zOrder);
        if (!zOrder) return;

        // 应用到所有窗口
        for (const k of Object.keys(widgetWindows)) {
          const w = widgetWindows[k];
          if (w && !w.isDestroyed()) {
            applyZOrder(w, zOrder);
          }
        }

        // 持久化
        const ex = utools.db.get('widget-settings') || {};
        const doc = { _id: 'widget-settings', theme: ex.theme || 'auto', zOrder: zOrder };
        if (ex && ex._rev) doc._rev = ex._rev;
        utools.db.put(doc);
      });
      console.log('[DesktopWidget] ipcRenderer zorder-change 监听已注册');
    } catch(e) {
      console.warn('[DesktopWidget] ipcRenderer 不可用:', e.message);
    }

    // ======== 桌面钉住：轮询恢复被"显示桌面"隐藏的窗口 ========
    setInterval(() => {
      for (const k of Object.keys(widgetWindows)) {
        const w = widgetWindows[k];
        if (!w || w.isDestroyed()) continue;
        try {
          // Win+D / "显示桌面" 会最小化所有窗口
          if (w.isMinimized()) {
            w.restore();
          }
          if (!w.isVisible()) {
            w.show();
            w.restore();
          }
          // 补偿层级 — 底层窗口可能在 restore 后被提到前面
          const z = getGlobalZOrder();
          if (z === 'bottom') {
            if (w.isAlwaysOnTop()) w.setAlwaysOnTop(false);
            try { w.moveBottom(); } catch(e) {}
          } else if (z === 'top' && !w.isAlwaysOnTop()) {
            w.setAlwaysOnTop(true, 'screen-saver');
          }
        } catch(e) {}
      }
    }, 200);

    // ======== 插件生命周期 ========
    utools.onPluginEnter(({ code }) => {
      if (code !== 'desktop-widget') return;

      // 已有存活窗口：补齐缺失窗口，然后显示并聚焦
      const existingKeys = Object.keys(widgetWindows).filter(k => {
        const w = widgetWindows[k];
        return w && !w.isDestroyed();
      });

      if (existingKeys.length > 0) {
        for (const cfg of MODULE_CONFIGS) {
          if (!widgetWindows[cfg.id] || widgetWindows[cfg.id].isDestroyed()) {
            try { createWidgetWindow(cfg); } catch(e) { console.error(`[DesktopWidget] 补创建 ${cfg.name} 失败:`, e); }
          }
        }
        for (const k of Object.keys(widgetWindows)) {
          try {
            const zOrder = getGlobalZOrder();
            widgetWindows[k].show();
            applyZOrder(widgetWindows[k], zOrder);
            widgetWindows[k].focus();
          } catch(e) {}
        }
        utools.hideMainWindow();
        return;
      }

      // 首次启动
      try {
        for (const cfg of MODULE_CONFIGS) {
          createWidgetWindow(cfg);
        }
      } catch (err) {
        console.error('[DesktopWidget] 创建窗口异常:', err);
        utools.showNotification('桌面组件启动失败: ' + err.message);
      }

      utools.hideMainWindow();
    });

    utools.onPluginOut((isKill) => {
      console.log('[DesktopWidget] 插件退出, isKill:', isKill);
      if (isKill) {
        for (const k of Object.keys(widgetWindows)) {
          try {
            if (widgetWindows[k] && !widgetWindows[k].isDestroyed()) {
              widgetWindows[k].close();
            }
          } catch(e) {}
          delete widgetWindows[k];
        }
      }
    });
  </script>
</body>
</html>
