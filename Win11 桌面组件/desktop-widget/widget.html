<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面组件</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="modules/clock/clock.css">
  <link rel="stylesheet" href="modules/calendar/calendar.css">
  <link rel="stylesheet" href="modules/weather/weather.css">
  <link rel="stylesheet" href="modules/todo/todo.css">
  <link rel="stylesheet" href="modules/quick-launch/quick-launch.css">
  <style>
    html {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      background: transparent;
    }
    body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 500;
      color: var(--text-primary);
      user-select: none; -webkit-user-select: none;
      box-sizing: border-box;
    }
    /* 拖拽条 */
    #drag-handle {
      position: absolute; top: 0; left: 0; right: 0; height: 28px;
      z-index: 5; -webkit-app-region: drag; cursor: move;
      display: flex; align-items: center; padding: 0 8px;
    }
    #drag-handle .module-title {
      font-size: 11px; font-weight: 600; color: var(--text-tertiary);
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-left: 6px;
    }
    #drag-handle .module-icon { font-size: 14px; line-height: 1; }
    #drag-handle .actions {
      margin-left: auto; display: flex; gap: 4px;
      -webkit-app-region: no-drag;
      opacity: 0; transition: opacity 0.15s;
    }
    body:hover #drag-handle .actions { opacity: 1; }
    .action-btn {
      width: 20px; height: 20px; border-radius: 6px; border: none;
      background: rgba(255,255,255,0.06); color: var(--text-secondary);
      cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .action-btn:hover { background: rgba(255,100,100,0.25); color: #ff6b6b; }
    .action-btn.zorder-btn:hover { background: rgba(100,160,255,0.20); color: var(--accent); }
    /* 内容区 */
    #module-content {
      position: absolute; top: 28px; left: 0; right: 0; bottom: 0;
      padding: 4px 8px 8px;
    }
    /* 缩放手柄 — 加大 hitbox */
    #resize-handle {
      position: absolute; bottom: 0; right: 0;
      width: 28px; height: 28px; cursor: nwse-resize; z-index: 10;
      opacity: 0; transition: opacity 0.15s;
      background: none;
    }
    #resize-handle::after {
      content: '';
      position: absolute; bottom: 4px; right: 4px;
      width: 12px; height: 12px;
      background: linear-gradient(135deg, transparent 38%, rgba(255,255,255,0.25) 38%, rgba(255,255,255,0.25) 52%, transparent 52%);
      border-radius: 2px;
    }
    body:hover #resize-handle { opacity: 0.5; }
    #resize-handle:hover { opacity: 1 !important; }
    /* 加载提示 */
    #loading {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: var(--text-tertiary); font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="drag-handle">
    <span class="module-icon" id="module-icon">📦</span>
    <span class="module-title" id="module-title">加载中...</span>
    <div class="actions">
      <button class="action-btn zorder-btn" id="zorder-btn" title="窗口层级">📌</button>
      <button class="action-btn" id="remove-btn" title="关闭模块">✕</button>
    </div>
  </div>
  <div id="module-content"></div>
  <div id="resize-handle"></div>
  <div id="loading">正在加载...</div>

  <script src="modules/module-base.js"></script>
  <script src="modules/clock/clock.js"></script>
  <script src="modules/calendar/calendar.js"></script>
  <script src="modules/weather/weather.js"></script>
  <script src="modules/todo/todo.js"></script>
  <script src="modules/quick-launch/quick-launch.js"></script>
  <script>
    (function() {
      // 从 URL 参数读取模块 ID
      const params = new URLSearchParams(window.location.search);
      const moduleId = params.get('module');

      const MODULE_MAP = {
        clock:        { cls: ClockModule,       icon: '🕐', name: '时钟' },
        calendar:     { cls: CalendarModule,    icon: '📅', name: '日历' },
        weather:      { cls: WeatherModule,     icon: '🌤️', name: '天气' },
        todo:         { cls: TodoModule,        icon: '✅', name: '待办' },
        'quick-launch': { cls: QuickLaunchModule, icon: '🚀', name: '快捷启动' }
      };

      if (!MODULE_MAP[moduleId]) {
        document.getElementById('loading').textContent = '❌ 未知模块: ' + moduleId;
        return;
      }

      const info = MODULE_MAP[moduleId];
      document.getElementById('module-icon').textContent = info.icon;
      document.getElementById('module-title').textContent = info.name;
      document.getElementById('loading').style.display = 'none';

      function applyTheme(theme) {
        if (theme === 'auto') {
          delete document.documentElement.dataset.theme;
        } else {
          document.documentElement.dataset.theme = theme;
        }
      }

      function applyTint(tint) {
        if (tint === 'white') {
          document.body.dataset.tint = 'white';
        } else {
          delete document.body.dataset.tint;
        }
      }

      function applyOpacity(val) {
        // 防御：undefined / NaN / 非数字直接移除 inline 覆盖，回退 CSS 默认值
        if (val == null || isNaN(Number(val))) {
          document.body.style.removeProperty('--tint-opacity');
        } else {
          document.body.style.setProperty('--tint-opacity', String(Number(val)));
        }
      }

      function updateWidgetSettings(patch) {
        const ex = utools.db.get('widget-settings') || {};
        const doc = {
          _id: 'widget-settings',
          theme: ex.theme || 'auto',
          tint: ex.tint || 'black',
          tintOpacity: ex.tintOpacity != null ? ex.tintOpacity : undefined,
          zOrder: ex.zOrder || 'bottom',
          ...patch
        };
        if (ex && ex._rev) doc._rev = ex._rev;
        utools.db.put(doc);
        return doc;
      }

      // --- 主题适配 ---
      const st = utools.db.get('widget-settings') || {};
      applyTheme(st.theme || 'auto');
      applyTint(st.tint || 'black');
      if (st.tintOpacity != null) applyOpacity(st.tintOpacity);

      // 创建并渲染模块
      const module = new info.cls();
      const container = document.getElementById('module-content');
      module.render(container);

      // --- 窗口级拖拽（由 -webkit-app-region: drag 处理，JS 监听移动后保存位置） ---
      let saveTimer = null;
      function saveWindowLayout() {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          const layout = utools.db.get('widget-layout') || { _id: 'widget-layout', modules: {} };
          if (!layout.modules) layout.modules = {};
          layout.modules[moduleId] = {
            x: window.screenX,
            y: window.screenY,
            w: window.outerWidth,
            h: window.outerHeight
          };
          const doc = { _id: 'widget-layout', modules: layout.modules };
          const existing = utools.db.get('widget-layout');
          if (existing && existing._rev) doc._rev = existing._rev;
          utools.db.put(doc);
        }, 500);
      }

      // 监听窗口移动（通过轮询或 resize/move 事件）
      // uTools 的 BrowserWindow 没有直接的 move/resize 事件，用轮询检测
      let lastX = window.screenX, lastY = window.screenY,
          lastW = window.outerWidth, lastH = window.outerHeight;
      setInterval(() => {
        if (window.screenX !== lastX || window.screenY !== lastY ||
            window.outerWidth !== lastW || window.outerHeight !== lastH) {
          lastX = window.screenX; lastY = window.screenY;
          lastW = window.outerWidth; lastH = window.outerHeight;
          saveWindowLayout();
        }
      }, 800);

      // --- 缩放手柄 ---
      const resizeHandle = document.getElementById('resize-handle');
      let resizeState = null;

      resizeHandle.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        resizeState = {
          startX: e.screenX,
          startY: e.screenY,
          origW: window.outerWidth,
          origH: window.outerHeight
        };
        e.preventDefault();
        e.stopPropagation();
      });

      document.addEventListener('mousemove', (e) => {
        if (!resizeState) return;
        const newW = Math.max(160, Math.min(600, resizeState.origW + (e.screenX - resizeState.startX)));
        const newH = Math.max(100, Math.min(600, resizeState.origH + (e.screenY - resizeState.startY)));
        try { window.resizeTo(newW, newH); } catch(ex) {}
      });

      document.addEventListener('mouseup', () => {
        if (resizeState) {
          resizeState = null;
          saveWindowLayout();
        }
      });

      // --- 关闭按钮 ---
      document.getElementById('remove-btn').addEventListener('click', () => {
        module.destroy();
        try { window.close(); } catch(e) {}
      });

      // --- 右键设置面板：主题切换 ---
      // 仅在模块未消费右键时显示（快捷启动等模块自己处理右键菜单）
      document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        // 如果事件来自模块内容区，由模块自己处理，不弹设置面板
        if (e.target.closest('#module-content')) return;
        showSettingsPanel();
      });

      function showSettingsPanel() {
        const old = document.querySelector('.widget-settings-overlay');
        if (old) { old.remove(); return; }

        const settings = utools.db.get('widget-settings') || {};
        const curTheme = settings.theme || 'auto';
        const curTint = settings.tint || 'black';
        const curOpacity = settings.tintOpacity != null ? settings.tintOpacity : (curTint === 'white' ? 0.38 : 0.42);
        const themes = [
          { value: 'auto', label: '跟随系统', icon: '🖥️' },
          { value: 'dark', label: '深色', icon: '🌙' },
          { value: 'light', label: '浅色', icon: '☀️' }
        ];
        const tints = [
          { value: 'black', label: '黑底', icon: '⬛' },
          { value: 'white', label: '白底', icon: '⬜' }
        ];

        let rangeVal = curOpacity;

        const overlay = document.createElement('div');
        overlay.className = 'widget-settings-overlay';
        overlay.innerHTML = `
          <div class="widget-settings-dialog">
            <h3>⚙ 窗口设置</h3>
            <div class="setting-section">
              <div class="setting-label">主题颜色</div>
              <div class="theme-options">
                ${themes.map(t => `
                  <button class="theme-option ${t.value === curTheme ? 'active' : ''}" data-theme="${t.value}">
                    <span>${t.icon}</span><span>${t.label}</span>
                  </button>
                `).join('')}
              </div>
            </div>
            <div class="setting-section" style="margin-top:12px">
              <div class="setting-label">底色遮罩</div>
              <div class="theme-options">
                ${tints.map(t => `
                  <button class="theme-option ${t.value === curTint ? 'active' : ''}" data-tint="${t.value}">
                    <span>${t.icon}</span><span>${t.label}</span>
                  </button>
                `).join('')}
              </div>
            </div>
            <div class="setting-section" style="margin-top:12px">
              <div class="setting-label">遮罩浓度 <span style="font-weight:400;color:var(--text-tertiary)">（${Math.round(rangeVal * 100)}%）</span></div>
              <div class="setting-range-row">
                <span style="font-size:13px">🫥</span>
                <input type="range" id="tint-opacity-range" min="5" max="95" value="${Math.round(rangeVal * 100)}">
                <span style="font-size:13px">⬛</span>
              </div>
            </div>
            <div class="setting-hint">右键任意模块可再次打开设置；📌 按钮用于切换窗口层级。</div>
          </div>
        `;
        document.body.appendChild(overlay);

        const rangeInput = overlay.querySelector('#tint-opacity-range');
        const rangeLabel = overlay.querySelector('.setting-label span');

        rangeInput.addEventListener('input', () => {
          rangeVal = parseInt(rangeInput.value) / 100;
          applyOpacity(rangeVal);
          if (rangeLabel) rangeLabel.textContent = `（${rangeInput.value}%）`;
        });

        rangeInput.addEventListener('change', () => {
          updateWidgetSettings({ tintOpacity: rangeVal });
        });

        overlay.querySelectorAll('.theme-option[data-theme]').forEach(btn => {
          btn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            const val = btn.dataset.theme;
            updateWidgetSettings({ theme: val });
            applyTheme(val);
            overlay.remove();
          });
        });

        overlay.querySelectorAll('.theme-option[data-tint]').forEach(btn => {
          btn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            const val = btn.dataset.tint;
            updateWidgetSettings({ tint: val });
            applyTint(val);
            overlay.remove();
          });
        });

        overlay.addEventListener('click', (ev) => {
          if (ev.target === overlay) overlay.remove();
        });
      }

      // --- 层级按钮（发送消息到父窗口，由父窗口调用 setAlwaysOnTop） ---
      const zorderBtn = document.getElementById('zorder-btn');
      const ZORDER_ICONS = { top: '🔝', normal: '📋', bottom: '⬇️' };
      function applyZOrderIcon() {
        const settings = utools.db.get('widget-settings') || {};
        zorderBtn.textContent = ZORDER_ICONS[settings.zOrder || 'bottom'] || '🔝';
      }
      applyZOrderIcon();

      zorderBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const oldMenu = document.querySelector('.zorder-menu');
        if (oldMenu) { oldMenu.remove(); return; }

        const settings = utools.db.get('widget-settings') || {};
        const curZ = settings.zOrder || 'bottom';

        const menu = document.createElement('div');
        menu.className = 'context-menu zorder-menu';
        menu.style.position = 'fixed';
        menu.style.left = '8px';
        menu.style.top = '32px';
        menu.style.minWidth = '170px';
        menu.style.zIndex = '2000';
        const items = [
          { z: 'top',    label: '🔝 顶层',   desc: '始终在其他窗口之上' },
          { z: 'normal', label: '📋 正常',   desc: '与其他窗口平级' },
          { z: 'bottom', label: '⬇️ 底层',   desc: '贴桌面，按 Win+D 可见' },
        ];
        menu.innerHTML = items.map(it =>
          `<div class="menu-item ${it.z === curZ ? 'active' : ''}" data-z="${it.z}" style="flex-direction:column;align-items:flex-start;gap:2px">
            <span style="font-weight:600">${it.label} ${it.z === curZ ? '✓' : ''}</span>
            <span style="font-size:10px;color:var(--text-tertiary)">${it.desc}</span>
          </div>`
        ).join('');
        document.body.appendChild(menu);

        menu.addEventListener('click', (ev) => {
          const item = ev.target.closest('.menu-item');
          if (!item) return;
          const val = item.dataset.z;
          updateWidgetSettings({ zOrder: val });
          // 通知父窗口
          if (window.utools && utools.sendToParent) {
            utools.sendToParent('zorder-change', val);
          }
          applyZOrderIcon();
          menu.remove();
        });
        const closeHandler = (ev) => {
          if (!menu.contains(ev.target) && ev.target !== zorderBtn) {
            menu.remove();
            document.removeEventListener('click', closeHandler);
          }
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 0);
      });

      console.log(`[DesktopWidget] ${info.name} 模块已启动`);
    })();
  </script>
</body>
</html>
