<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Win11 桌面组件</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="modules/clock/clock.css">
  <link rel="stylesheet" href="modules/calendar/calendar.css">
  <link rel="stylesheet" href="modules/weather/weather.css">
  <link rel="stylesheet" href="modules/todo/todo.css">
  <link rel="stylesheet" href="modules/quick-launch/quick-launch.css">
  <style>
    #window-drag-handle {
      position: absolute; top: 0; left: 0; right: 0; height: 28px;
      z-index: 5; -webkit-app-region: drag; cursor: move;
      display: flex; align-items: center; justify-content: center;
    }
    #window-drag-handle .drag-indicator {
      width: 32px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.15); transition: background 0.2s;
    }
    #window-drag-handle:hover .drag-indicator {
      background: rgba(255,255,255,0.3);
    }
    #desktop-container {
      position: absolute; top: 28px; left: 0; right: 0; bottom: 0; padding: 8px;
    }
    #settings-btn {
      position: absolute; top: 4px; right: 8px;
      width: 22px; height: 22px; border-radius: 6px; border: none;
      background: transparent; color: var(--text-tertiary); cursor: pointer;
      font-size: 13px; z-index: 6;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; -webkit-app-region: no-drag;
    }
    #settings-btn:hover {
      background: rgba(255,255,255,0.08); color: var(--text-primary);
    }
    /* 设置弹窗 */
    .settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    .settings-dialog {
      background: rgba(30, 30, 44, 0.96);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px 24px;
      min-width: 260px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .settings-dialog h3 { font-size: 15px; margin-bottom: 16px; color: var(--text-primary); }
    .settings-group { margin-bottom: 12px; }
    .settings-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .settings-theme-btns { display: flex; gap: 6px; }
    .settings-theme-btn {
      flex: 1; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border-card); background: transparent;
      color: var(--text-secondary); cursor: pointer; font-size: 12px;
      text-align: center; transition: all 0.15s;
    }
    .settings-theme-btn:hover { background: rgba(255,255,255,0.04); }
    .settings-theme-btn.active { background: var(--accent); border-color: transparent; color: #fff; }
  </style>
</head>
<body>
  <div id="window-drag-handle"><div class="drag-indicator"></div></div>
  <button id="settings-btn" title="设置">⚙</button>
  <div id="desktop-container"></div>

  <script src="modules/module-base.js"></script>
  <script src="modules/clock/clock.js"></script>
  <script src="modules/calendar/calendar.js"></script>
  <script src="modules/weather/weather.js"></script>
  <script src="modules/todo/todo.js"></script>
  <script src="modules/quick-launch/quick-launch.js"></script>
  <script src="framework.js"></script>
  <script>
    // 注册模块
    WidgetFramework.register(new ClockModule());
    WidgetFramework.register(new CalendarModule());
    WidgetFramework.register(new WeatherModule());
    WidgetFramework.register(new TodoModule());
    WidgetFramework.register(new QuickLaunchModule());

    // 启动
    WidgetFramework.init('desktop-container');

    // --- 主题初始化 ---
    const st = utools.db.get('widget-settings') || {};
    const theme = st.theme || 'auto'; // 'auto' | 'light' | 'dark'
    if (theme === 'auto') {
      delete document.documentElement.dataset.theme;
    } else {
      document.documentElement.dataset.theme = theme;
    }

    // --- 设置按钮 ---
    document.getElementById('settings-btn').addEventListener('click', function(e) {
      // 打开真正的设置面板
      const old = document.querySelector('.settings-overlay');
      if (old) { old.remove(); return; }

      const curTheme = document.documentElement.dataset.theme || 'auto';

      const overlay = document.createElement('div');
      overlay.className = 'settings-overlay';
      overlay.innerHTML = `
        <div class="settings-dialog">
          <h3>⚙ 设置</h3>
          <div class="settings-group">
            <div class="settings-label">主题</div>
            <div class="settings-theme-btns">
              <button class="settings-theme-btn ${curTheme === 'auto' ? 'active' : ''}" data-theme="auto">跟随系统 🌓</button>
              <button class="settings-theme-btn ${curTheme === 'dark' ? 'active' : ''}" data-theme="dark">深色 🌙</button>
              <button class="settings-theme-btn ${curTheme === 'light' ? 'active' : ''}" data-theme="light">浅色 ☀️</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      // 主题切换
      overlay.querySelectorAll('.settings-theme-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.dataset.theme;
          if (val === 'auto') {
            delete document.documentElement.dataset.theme;
          } else {
            document.documentElement.dataset.theme = val;
          }
          // 持久化
          const existing = utools.db.get('widget-settings');
          const doc = { _id: 'widget-settings', theme: val };
          if (existing && existing._rev) doc._rev = existing._rev;
          utools.db.put(doc);
          // 更新按钮状态
          overlay.querySelectorAll('.settings-theme-btn').forEach(b => b.classList.remove('active'));
          overlay.querySelector(`[data-theme="${val}"]`).classList.add('active');
        });
      });

      // 点击遮罩关闭
      overlay.addEventListener('click', (ev) => {
        if (ev.target === overlay) overlay.remove();
      });
    });

    console.log('[DesktopWidget] 桌面组件已启动');
  </script>
</body>
</html>
